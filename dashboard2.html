<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NeuroNotes - Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f4f6fb;
display:flex;
}

/* Sidebar */

.sidebar{
width:220px;
height:100vh;
background:#4f46e5;
color:white;
padding:25px;
position:fixed;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
font-size:15px;
}

.sidebar a:hover{
opacity:0.8;
}

.sidebar a.active{
font-weight:600;
text-decoration:underline;
}

/* Main Content */

.main{
margin-left:220px;
padding:40px;
width:100%;
}

/* Top Bar */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logout{
background:#ef4444;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

/* Cards */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card h3{
margin-bottom:10px;
}

/* Quick actions */

.actions{
display:flex;
gap:15px;
margin-top:10px;
}

.action-btn{
background:#4f46e5;
color:white;
padding:10px 14px;
border:none;
border-radius:6px;
cursor:pointer;
}

/* Recent resources */

.resources{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.resource-item{
padding:10px 0;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h2>NeuroNotes</h2>

<a href="index.html">Home</a>
<a href="dashboard2.html" class="active">Dashboard</a>
<a href="subject2.html">Subjects</a>
<a href="upload.html">Upload Resource</a>
<a href="resource.html">Resources</a>

</div>


<!-- Main -->

<div class="main">

<div class="topbar">

<h2 id="welcomeText">Welcome</h2>

<button class="logout" onclick="logout()">Logout</button>

</div>


<!-- User Info -->

<div class="cards">

<div class="card">
<h3>Name</h3>
<p id="userName"></p>
</div>

<div class="card">
<h3>Email</h3>
<p id="userEmail"></p>
</div>

<div class="card">
<h3>Department</h3>
<p id="userDept"></p>
</div>

<div class="card">
<h3>Semester</h3>
<p id="userSem"></p>
</div>

</div>


<!-- Quick Actions -->

<div class="card">

<h3>Quick Actions</h3>

<div class="actions">

<button class="action-btn" onclick="goSubjects()">Browse Subjects</button>

<button class="action-btn" onclick="goUpload()">Upload Resource</button>

</div>

</div>

<br>


<!-- Recent Resources -->

<div class="resources">

<h3>Recent Resources</h3>

<div id="recentResources">

</div>

</div>


</div>


<script>

/* get user data */

let user = JSON.parse(localStorage.getItem("user"))

if(!user){
window.location.href="signup.html"
}

/* display user info */

document.getElementById("userName").innerText = user.name
document.getElementById("userEmail").innerText = user.email
document.getElementById("userDept").innerText = user.department
document.getElementById("userSem").innerText = user.semester

document.getElementById("welcomeText").innerText = "Hello " + user.name


/* navigation */

function goSubjects(){
window.location.href="subject2.html"
}

function goUpload(){
window.location.href="upload.html"
}


/* show recent resources (from localStorage, synced from API) */
var API_BASE = "http://localhost:4001";
function loadRecentResources(){
  var container = document.getElementById("recentResources");
  var all = JSON.parse(localStorage.getItem("resources")) || [];
  var mine = all.filter(function(r){ return r.ownerEmail === user.email; });
  if(mine.length === 0){
    container.innerHTML = "<p>No resources uploaded yet.</p>";
    return;
  }
  var recent = mine.slice(-5).reverse();
  container.innerHTML = "";
  recent.forEach(function(r){
    var div = document.createElement("div");
    div.className = "resource-item";
    var typeLabel = r.type ? r.type.toUpperCase() : "";
    var fileLabel = r.fileName ? ("File: " + r.fileName) : "";
    div.innerHTML = "<strong>" + (r.title || "Untitled resource") + "</strong><br><small>" + (r.subject || "No subject") + (typeLabel ? " • " + typeLabel : "") + "</small>" + (fileLabel ? "<br><small>" + fileLabel + "</small>" : "");
    container.appendChild(div);
  });
}
fetch(API_BASE + "/api/resources").then(function(r){ return r.ok ? r.json() : []; }).then(function(rows){
  if(rows && Array.isArray(rows)){ localStorage.setItem("resources", JSON.stringify(rows)); }
  loadRecentResources();
}).catch(function(){ loadRecentResources(); });

/* logout */

function logout(){

localStorage.removeItem("loggedIn")

window.location.href="index.html"

}

</script>

</body>
</html>
