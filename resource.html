<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NeuroNotes - Resources</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(120deg,#667eea,#764ba2);
min-height:100vh;
color:white;
}

/* Navbar */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
}

.logo{
font-size:24px;
font-weight:600;
}

nav ul{
list-style:none;
display:flex;
gap:25px;
}

nav ul li a{
text-decoration:none;
color:white;
}

/* Page Title */

.page-title{
text-align:center;
margin-top:40px;
}

.page-title h1{
font-size:38px;
}

/* Resource Section */

.resources{
padding:60px;
}

.resource-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

/* Resource Card */

.resource-card{
background:rgba(255,255,255,0.12);
padding:30px;
border-radius:20px;
text-align:center;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
transition:0.3s;
cursor:pointer;
}

.resource-card:hover{
transform:translateY(-10px);
background:rgba(255,255,255,0.2);
}

.resource-icon{
font-size:40px;
margin-bottom:10px;
}

.resource-card h3{
margin-bottom:5px;
}

.resource-type{
font-size:14px;
opacity:0.8;
}

.resource-actions{
margin-top:12px;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

.resource-actions a, .resource-actions button{
padding:8px 16px;
border-radius:8px;
font-size:13px;
text-decoration:none;
border:none;
cursor:pointer;
background:rgba(255,255,255,0.25);
color:white;
}
.resource-actions a:hover, .resource-actions button:hover{
background:rgba(255,255,255,0.4);
}
.resource-card a.external-link{ background:#4f46e5; }

.link-list-card{
background:rgba(255,255,255,0.12);
padding:20px;
border-radius:16px;
margin-bottom:12px;
text-align:left;
border:1px solid rgba(255,255,255,0.2);
}
.link-list-card a{
color:#a5b4fc;
text-decoration:none;
margin-right:12px;
}
.link-list-card a:hover{ text-decoration:underline; }

.no-data{
text-align:center;
font-size:18px;
opacity:0.8;
}

footer{
text-align:center;
padding:20px;
opacity:0.8;
}

</style>
</head>

<body>

<!-- Navbar -->

<nav>

<div class="logo">NeuroNotes</div>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="dashboard2.html">Dashboard</a></li>
<li><a href="subject2.html">Subjects</a></li>
<li><a href="upload.html">Upload</a></li>
<li><a href="resource.html">Resources</a></li>
<li><a href="signup.html" id="loginBtn">Login</a></li>
<li><a href="#" id="logoutBtn" style="display:none;" onclick="logoutUser()">Logout</a></li>
</ul>

</nav>

<!-- Title -->

<div class="page-title">

<h1 id="subjectTitle">Subject :</h1>

</div>

<!-- Resource Cards -->

<section class="resources">

<div class="resource-grid" id="resourceContainer">

</div>

</section>

<footer>
<p>© 2026 NeuroNotes</p>
</footer>

<script>
var API_BASE = "http://localhost:4001";
let demoResources = [
  {title:"DBMS Unit 1 Notes",subject:"DBMS",type:"notes",link:"#"},
  {title:"SQL Queries PPT",subject:"DBMS",type:"ppt",link:"#"},
  {title:"DBMS Lecture Video",subject:"DBMS",type:"youtube",link:"https://youtube.com"},
  {title:"Python Basics Notes",subject:"Python Programming",type:"notes",link:"#"}
];
let titleElement = document.getElementById("subjectTitle");
let container = document.getElementById("resourceContainer");
let subject = localStorage.getItem("selectedSubject");
var isPredefined = localStorage.getItem("predefinedSubject") === "true";
var subjectLinksJson = localStorage.getItem("subjectLinks");

function renderResourcePage(){
  if(isPredefined && subjectLinksJson){
    var links = [];
    try{ links = JSON.parse(subjectLinksJson); }catch(e){}
    titleElement.innerText = "Subject : " + (subject || "Links");
    container.innerHTML = "";
    if(links.length === 0){
      container.innerHTML = "<p class=\"no-data\">No links for this subject.</p>";
      return;
    }
    links.forEach(function(item){
      var div = document.createElement("div");
      div.className = "link-list-card";
      div.innerHTML = "<strong>" + (item.label || "Link") + "</strong><br><a href=\"" + (item.url || "#") + "\" target=\"_blank\" class=\"external-link\">Open website →</a>";
      container.appendChild(div);
    });
    return;
  }
  localStorage.removeItem("predefinedSubject");
  localStorage.removeItem("subjectLinks");
  var stored = JSON.parse(localStorage.getItem("resources")) || [];
  var resources = stored.length ? stored : demoResources;
  if(!subject){
    titleElement.innerText = "Subject : Not selected";
    container.innerHTML = "<p class=\"no-data\">No subject selected. Please go back to Subjects and choose one.</p>";
    return;
  }
  titleElement.innerText = "Subject : " + subject;
  var filteredResources = resources.filter(function(r){ return r.subject === subject; });
  if(filteredResources.length === 0){
    container.innerHTML = "<p class=\"no-data\">No resources available for <strong>" + subject + "</strong> yet. Try uploading from the Upload page.</p>";
    return;
  }
  container.innerHTML = "";
  filteredResources.forEach(function(resource){
    var icon="📄";
    if(resource.type==="ppt") icon="📊";
    if(resource.type==="youtube") icon="🎥";
    var card = document.createElement("div");
    card.className="resource-card";
    var typeLabel = resource.type ? resource.type.toUpperCase() : "RESOURCE";
    var fileLabel = resource.fileName ? "File: " + resource.fileName : "";
    var hasServerFile = resource.id && resource.fileName;
    var fileUrl = hasServerFile ? (API_BASE + "/api/files/" + encodeURIComponent(resource.fileName)) : "";
    var actionsHtml = "";
    if(hasServerFile){
      actionsHtml = "<div class=\"resource-actions\"><a href=\"" + fileUrl + "\" target=\"_blank\">View / Read</a><a href=\"" + fileUrl + "?download=1\" target=\"_blank\" download>Download</a></div>";
    } else if(resource.link){
      actionsHtml = "<div class=\"resource-actions\"><a href=\"" + resource.link + "\" target=\"_blank\" class=\"external-link\">Open link</a></div>";
    }
    card.innerHTML = "<div class=\"resource-icon\">" + icon + "</div><h3>" + (resource.title || "Untitled resource") + "</h3><p class=\"resource-type\">" + typeLabel + "</p>" + (fileLabel ? "<p class=\"resource-type\">" + fileLabel + "</p>" : "") + actionsHtml;
    container.appendChild(card);
  });
}
renderResourcePage();
fetch(API_BASE + "/api/resources").then(function(r){ return r.ok ? r.json() : []; }).then(function(rows){
  if(rows && Array.isArray(rows)){ localStorage.setItem("resources", JSON.stringify(rows)); renderResourcePage(); }
}).catch(function(){});

function checkLogin(){
let isLoggedIn = localStorage.getItem("loggedIn");
if(isLoggedIn === "true"){
let loginBtn = document.getElementById("loginBtn");
let logoutBtn = document.getElementById("logoutBtn");
if(loginBtn) loginBtn.style.display="none";
if(logoutBtn) logoutBtn.style.display="block";
}
}
checkLogin();
function logoutUser(){
localStorage.removeItem("loggedIn");
window.location.href="index.html";
}

</script>

</body>
</html>
