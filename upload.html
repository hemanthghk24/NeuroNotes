<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NeuroNotes - Upload Resource</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(120deg,#667eea,#764ba2);
min-height:100vh;
color:white;
}

/* Navbar */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
}

.logo{
font-size:24px;
font-weight:600;
}

nav ul{
list-style:none;
display:flex;
gap:25px;
}

nav ul li a{
text-decoration:none;
color:white;
}

/* Upload Section */

.upload-container{
display:flex;
justify-content:center;
gap:40px;
margin-top:60px;
align-items:flex-start;
}

.upload-card{
background:rgba(255,255,255,0.12);
padding:40px;
border-radius:20px;
width:420px;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
}

.upload-card h2{
text-align:center;
margin-bottom:20px;
}

.upload-card input,
.upload-card select{

width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:8px;
outline:none;

}

.upload-btn{

width:100%;
padding:12px;
background:#ffcc00;
border:none;
border-radius:25px;
font-weight:600;
cursor:pointer;

}

.upload-btn:hover{
background:#ffd633;
}

.success{
margin-top:10px;
text-align:center;
color:#ffeb3b;
}

/* User resource list */

.user-resources{
flex:1;
max-width:480px;
background:rgba(0,0,0,0.2);
border-radius:20px;
padding:24px;
border:1px solid rgba(255,255,255,0.25);
color:white;
}

.user-resources h3{
margin-bottom:8px;
}

.user-resources p{
opacity:0.9;
margin-bottom:14px;
font-size:14px;
}

.resource-list{
list-style:none;
max-height:260px;
overflow-y:auto;
padding-right:4px;
}

.resource-item{
padding:8px 4px;
border-bottom:1px solid rgba(255,255,255,0.18);
font-size:14px;
}

.resource-item span{
display:block;
}

.resource-item small{
opacity:0.85;
}

.delete-btn{
margin-top:4px;
padding:4px 10px;
border-radius:999px;
border:none;
background:#ef4444;
color:white;
font-size:11px;
cursor:pointer;
}

.delete-btn:hover{
background:#dc2626;
}

footer{
text-align:center;
padding:20px;
margin-top:40px;
opacity:0.8;
}

</style>

</head>

<body>

<!-- Navbar -->

<nav>

<div class="logo">NeuroNotes</div>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="dashboard2.html">Dashboard</a></li>
<li><a href="subject2.html">Subjects</a></li>
<li><a href="upload.html">Upload</a></li>
<li><a href="resource.html">Resources</a></li>
<li><a href="signup.html" id="loginBtn">Login</a></li>
<li><a href="#" id="logoutBtn" style="display:none;" onclick="logoutUser()">Logout</a></li>
</ul>

</nav>

<!-- Upload Form -->

<div class="upload-container">

<div class="upload-card">

<h2>Upload Resource</h2>

<input type="text" id="title" placeholder="Resource Title">

<input type="text" id="subject" placeholder="Subject Name">

<select id="type">

<option value="">Select Resource Type</option>
<option value="notes">Notes</option>
<option value="ppt">PPT</option>
<option value="youtube">YouTube Video</option>

</select>

<input type="text" id="link" placeholder="Paste YouTube Link (optional)">

<input type="file" id="fileUpload">

<button class="upload-btn" onclick="uploadResource()">Upload</button>

<p id="message" class="success"></p>

</div>

<div class="user-resources">
<h3>Your Uploaded Resources</h3>
<p id="userInfoText">Login to see your uploaded resources.</p>
<ul id="userResourceList" class="resource-list"></ul>
</div>

</div>

<footer>
<p>© 2026 NeuroNotes</p>
</footer>

<script>
var API_BASE = "http://localhost:4001";
function getCurrentUser(){
var user = JSON.parse(localStorage.getItem("user"));
var loggedIn = localStorage.getItem("loggedIn") === "true";
if(!user || !loggedIn){
return null;
}
return user;
}

function uploadResource(){
var user = getCurrentUser();
if(!user){
alert("Please login first to upload resources.");
window.location.href="signup.html";
return;
}

var title=document.getElementById("title").value;
var subject=document.getElementById("subject").value;
var type=document.getElementById("type").value;
var link=document.getElementById("link").value;
var file=document.getElementById("fileUpload").files[0];

if(title==="" || subject==="" || type===""){
alert("Please fill required fields");
return;
}

var formData = new FormData();
formData.append("title", title);
formData.append("subject", subject);
formData.append("type", type);
formData.append("link", link);
formData.append("ownerEmail", user.email);
formData.append("ownerName", user.name);
if(file) formData.append("file", file);

fetch(API_BASE + "/api/resources", { method: "POST", body: formData })
.then(function(res) {
  if (!res.ok) return res.json().catch(function() { return {}; }).then(function(e) { throw new Error(e.error || "Upload failed"); });
  return res.json();
})
.then(function(saved) {
  var resources = JSON.parse(localStorage.getItem("resources")) || [];
  resources.push({
    id: saved.id,
    title: saved.title,
    subject: saved.subject,
    type: saved.type,
    link: saved.link,
    fileName: saved.fileName || (file ? file.name : ""),
    ownerEmail: saved.ownerEmail || user.email,
    ownerName: user.name
  });
  localStorage.setItem("resources", JSON.stringify(resources));
  document.getElementById("message").innerText = "Resource uploaded successfully!";
  document.getElementById("title").value = "";
  document.getElementById("subject").value = "";
  document.getElementById("type").value = "";
  document.getElementById("link").value = "";
  document.getElementById("fileUpload").value = "";
  renderUserResources();
})
.catch(function(err) {
  document.getElementById("message").innerText = err.message || "Upload failed. Is the backend running? (npm start in backend folder)";
});
}

function renderUserResources(){
var listEl = document.getElementById("userResourceList");
var infoText = document.getElementById("userInfoText");
var user = getCurrentUser();

listEl.innerHTML = "";

if(!user){
infoText.innerText = "Login to see your uploaded resources.";
return;
}

infoText.innerText = "Showing uploads for " + user.name + " (" + user.email + ")";

var resources = JSON.parse(localStorage.getItem("resources")) || [];
var userResources = resources.filter(function(r){
return r.ownerEmail === user.email;
});

if(userResources.length === 0){
var li = document.createElement("li");
li.className = "resource-item";
li.innerHTML = "<span>No resources uploaded yet.</span>";
listEl.appendChild(li);
return;
}

userResources.forEach(function(r, index){
var li = document.createElement("li");
li.className = "resource-item";
var typeLabel = r.type ? r.type.toUpperCase() : "";
var fileLabel = r.fileName ? ("File: " + r.fileName) : "No file selected";
var linkLabel = r.link ? ("Link: " + r.link) : "";
var idStr = r.id != null ? r.id : "null";
li.innerHTML =
"<span><strong>" + r.title + "</strong></span>" +
"<span><small>Subject: " + r.subject + " • " + typeLabel + "</small></span>" +
"<span><small>" + fileLabel + "</small></span>" +
(linkLabel ? "<span><small>" + linkLabel + "</small></span>" : "") +
"<button class='delete-btn' onclick='deleteResource(" + idStr + ", " + index + ")'>Delete</button>";
listEl.appendChild(li);
});
}

function deleteResource(backendId, indexInUserList){
var resources = JSON.parse(localStorage.getItem("resources")) || [];
var userResources = resources.filter(function(r){ return r.ownerEmail === (getCurrentUser() && getCurrentUser().email); });
var item = userResources[indexInUserList];
if(!item) return;
if(!confirm("Delete \"" + (item.title || "this resource") + "\"?")) return;
function done(){
  renderUserResources();
  document.getElementById("message").innerText = "Resource deleted.";
}
if(backendId != null && backendId !== "null" && backendId !== ""){
  var idNum = parseInt(backendId, 10);
  var current = getCurrentUser();
  var ownerEmail = current ? encodeURIComponent(current.email) : "";
  fetch(API_BASE + "/api/resources/" + backendId + "?ownerEmail=" + ownerEmail, { method: "DELETE" })
  .then(function(res){ if(!res.ok) throw new Error("Delete failed"); return res.json(); })
  .then(function(){
    resources = resources.filter(function(r){ return r.id !== idNum; });
    localStorage.setItem("resources", JSON.stringify(resources));
    done();
  })
  .catch(function(){ document.getElementById("message").innerText = "Delete failed or backend offline."; });
} else {
  var idx = resources.findIndex(function(r){ return r.title === item.title && r.ownerEmail === item.ownerEmail; });
  if(idx >= 0) resources.splice(idx, 1);
  localStorage.setItem("resources", JSON.stringify(resources));
  done();
}
}

function checkLogin(){
var isLoggedIn = localStorage.getItem("loggedIn");
var loginBtn = document.getElementById("loginBtn");
var logoutBtn = document.getElementById("logoutBtn");
if(isLoggedIn === "true"){
if(loginBtn) loginBtn.style.display="none";
if(logoutBtn) logoutBtn.style.display="block";
}else{
if(loginBtn) loginBtn.style.display="block";
if(logoutBtn) logoutBtn.style.display="none";
}
}

function logoutUser(){
localStorage.removeItem("loggedIn");
window.location.href="index.html";
}

checkLogin();
function loadAndRender(){
  var u = getCurrentUser();
  if(!u) { renderUserResources(); return; }
  fetch(API_BASE + "/api/resources").then(function(r){ return r.ok ? r.json() : []; }).then(function(rows){
    if(rows && Array.isArray(rows)) localStorage.setItem("resources", JSON.stringify(rows));
    renderUserResources();
  }).catch(function(){ renderUserResources(); });
}
loadAndRender();
</script>

</body>
</html>
